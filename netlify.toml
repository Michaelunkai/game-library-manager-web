[build]
  command = "echo 'Static site - no build needed'"
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

[[headers]]
  for = "/api/docker-tags"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

[[headers]]
  for = "/api/game-metadata"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

# Route /api/admin-config to the Netlify Function (permanent GitHub persistence)
[[redirects]]
  from = "/api/admin-config"
  to = "/.netlify/functions/admin-config"
  status = 200
  force = true

# Route /api/docker-tags to a first-party Netlify Function.
# Browser CORS proxies are not reliable enough for complete startup sync.
[[redirects]]
  from = "/api/docker-tags"
  to = "/.netlify/functions/docker-tags"
  status = 200
  force = true

# Route /api/game-metadata to first-party metadata lookup.
# This avoids browser CORS proxy dependence for newly synced Docker tags.
[[redirects]]
  from = "/api/game-metadata"
  to = "/.netlify/functions/game-metadata"
  status = 200
  force = true

# All other routes serve the SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
